<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - UniEvent</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- CryptoJS for Password Hashing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo" style="background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 4px;">
                    <img src="../assets/project/logoblue.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h2>UniEvent Admin</h2>
                <p>Connectez-vous pour accéder au tableau de bord</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email Professionnel</label>
                    <input type="email" id="email" name="email" required placeholder="admin@estc.edu">
                </div>
                <div class="form-group">
                    <label for="password">Mot de Passe</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <div id="login-error" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn btn-primary btn-block">
                    Se Connecter <i class="ph ph-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <style>
        .login-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-coral), #d63d58);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin: 0 auto 1rem;
            box-shadow: 0 4px 15px rgba(231, 76, 94, 0.4);
        }
        .login-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .login-form .btn {
            margin-top: 1rem;
            height: 48px;
        }
        .login-header p {
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
    </style>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
